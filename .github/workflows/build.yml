name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the ZIP filename (e.g. 1.0.0). Defaults to dev."
        required: false
        default: "dev"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build manual-install package
        run: npm run build:manual-install -- "${{ github.event.inputs.version || 'dev' }}"

      - name: Upload artifact (versioned)
        uses: actions/upload-artifact@v4
        with:
          name: manual-install-v${{ github.event.inputs.version || 'dev' }}
          path: build/twenty-for-gmail-manual-install-v${{ github.event.inputs.version || 'dev' }}.zip
          if-no-files-found: error

      - name: Upload artifact (latest alias)
        uses: actions/upload-artifact@v4
        with:
          name: manual-install-latest
          path: build/twenty-for-gmail-manual-install-latest.zip
          if-no-files-found: error
