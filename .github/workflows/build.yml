name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the ZIP filename (e.g. 1.0.0). Defaults to dev."
        required: false
        default: "dev"
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Resolve version label
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Strip leading "v" from the release tag (e.g. v1.2.0 → 1.2.0)
            echo "label=${{ github.event.release.tag_name }}" | sed 's/label=v/label=/' >> "$GITHUB_OUTPUT"
          else
            echo "label=${{ github.event.inputs.version || 'dev' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build manual-install package
        run: npm run build:manual-install -- "${{ steps.version.outputs.label }}"

      - name: Upload artifact (versioned)
        uses: actions/upload-artifact@v4
        with:
          name: manual-install-v${{ steps.version.outputs.label }}
          path: build/twenty-for-gmail-manual-install-v${{ steps.version.outputs.label }}.zip
          if-no-files-found: error

      - name: Upload artifact (latest alias)
        uses: actions/upload-artifact@v4
        with:
          name: manual-install-latest
          path: build/twenty-for-gmail-manual-install-latest.zip
          if-no-files-found: error

      - name: Attach ZIP to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/twenty-for-gmail-manual-install-v${{ steps.version.outputs.label }}.zip
            build/twenty-for-gmail-manual-install-latest.zip
            build/manual-install/Code.gs
            build/manual-install/appsscript.json
